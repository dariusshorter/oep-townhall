name: Deploy OEP Town Hall

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest
    name: Build, test, and deploy
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build app and API
        run: npm run build

      - name: Package API for Azure Functions
        shell: bash
        run: |
          rm -rf api-deploy
          mkdir api-deploy
          cp api/host.json api/package.json api/package-lock.json api-deploy/
          cp -R api/dist api-deploy/dist
          node -e "const fs=require('fs'); const pkg=require('./api-deploy/package.json'); delete pkg.scripts; delete pkg.devDependencies; fs.writeFileSync('./api-deploy/package.json', JSON.stringify(pkg, null, 2));"
          npm ci --prefix api-deploy --omit=dev

      - name: Include Static Web Apps config in frontend output
        run: cp staticwebapp.config.json frontend/dist/staticwebapp.config.json

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: frontend/dist
          api_location: api-deploy
          skip_app_build: true
